syntax = "proto3";

package macp.v1;

message Envelope {
  string macp_version = 1;
  string mode = 2;
  string message_type = 3;
  string message_id = 4;
  string session_id = 5;
  string sender = 6;
  int64 timestamp_unix_ms = 7;
  bytes payload = 8;
}

message Ack {
  bool accepted = 1;
  string error = 2;
}

message SessionQuery {
  string session_id = 1;
}

message SessionInfo {
  string session_id = 1;
  string mode = 2;
  string state = 3;
  int64 ttl_expiry = 4;
  bytes resolution = 5;
  bytes mode_state = 6;
  repeated string participants = 7;
}

service MACPService {
  rpc SendMessage(Envelope) returns (Ack);
  rpc GetSession(SessionQuery) returns (SessionInfo);
}
